# nginx in Docker: static UI + proxy to control-api (same layout as server-stack/deploy/nginx.conf.example).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://control-api:8080;
    }

    location /health {
        proxy_pass http://control-api:8080/health;
    }
}
