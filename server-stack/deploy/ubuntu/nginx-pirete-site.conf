# Фрагмент для Ubuntu: положить в /etc/nginx/sites-available/pirete
# и включить: ln -sf ... sites-enabled/pirete
# Статика UI и прокси /api/ на control-api ([::1]:8080).

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/lib/pirete/ui/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://[::1]:8080;
    }

    location /health {
        proxy_pass http://[::1]:8080/health;
    }
}
