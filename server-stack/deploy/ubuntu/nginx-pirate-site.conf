# Фрагмент для Ubuntu: положить в /etc/nginx/sites-available/pirate
# и включить: ln -sf ... sites-enabled/pirate
# Статика UI и прокси /api/ на control-api (localhost :8080).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    client_max_body_size 0;
    client_body_timeout 3600s;

    root /var/lib/pirate/ui/dist;
    index index.html;

    # Clean login URL (without this, `try_files` below would serve index.html for /login).
    location = /login {
        try_files /login.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket (host-stats, host-terminal, …); Upgrade required when proxying through nginx.
    location ~ ^/api/.*/ws$ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080/health;
    }
}
