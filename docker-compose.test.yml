# Full stack for integration / e2e: PostgreSQL, deploy-server, control-api, nginx (static + API proxy).
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   docker compose -f docker-compose.test.yml run --rm e2e
# Or: ./scripts/e2e-docker.sh (wraps the above)
# Postgres data: named volume postgres-data. Reset: docker compose … down -v

services:
  postgres:
    # Debian-based image: fewer musl/locale edge cases than alpine; explicit data volume + shm for stable init.
    image: postgres:16-bookworm
    shm_size: 256mb
    environment:
      POSTGRES_USER: deploy
      POSTGRES_PASSWORD: deploy
      POSTGRES_DB: deploy
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy -d deploy"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  deploy-server:
    build:
      context: .
      target: runtime-base
    image: pirate-test-runtime
    ports:
      # Host → gRPC (local `client --endpoint http://127.0.0.1:50051` or desktop tooling)
      - "${DOCKER_E2E_GRPC_PORT:-50051}:50051"
    command:
      - deploy-server
      - --root
      - /data
      - --bind
      - "0.0.0.0"
      - -p
      - "50051"
      - --database-url
      - postgresql://deploy:deploy@postgres:5432/deploy
    environment:
      # E2E uses open gRPC; production should omit this and use Pair + signed requests.
      DEPLOY_GRPC_ALLOW_UNAUTHENTICATED: "1"
      # Enables UploadServerStack RPC (still needs native install + sudo helper on real hosts).
      DEPLOY_ALLOW_SERVER_STACK_UPDATE: "1"
      # Shown in dashboard “local client” JSON (host browser → published gRPC port).
      DEPLOY_GRPC_PUBLIC_URL: "http://127.0.0.1:${DOCKER_E2E_GRPC_PORT:-50051}"
      # Optional dashboard seed (with CONTROL_API_JWT_SECRET on control-api):
      CONTROL_UI_ADMIN_USERNAME: admin
      CONTROL_UI_ADMIN_PASSWORD: testpass
    volumes:
      - deploy-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  control-api:
    image: pirate-test-runtime
    pull_policy: never
    ports:
      # Direct HTTP API from host (bearer tests, debugging); dashboard still via nginx :18080
      - "${DOCKER_E2E_CONTROL_API_PORT:-18081}:8080"
    command:
      - control-api
      - --deploy-root
      - /data
      - --bind
      - "0.0.0.0"
      - --listen-port
      - "8080"
      - --grpc-endpoint
      - http://deploy-server:50051
      - --database-url
      - postgresql://deploy:deploy@postgres:5432/deploy
    volumes:
      - deploy-data:/data
    environment:
      CONTROL_API_HOST_STATS_SERIES: "1"  # Required for history charts in dashboard.
      CONTROL_API_HOST_STATS_STREAM: "1"  # Required for SSE stats chart in dashboard.
      CONTROL_API_CORS_ALLOW_ANY: "1"
      # Optional: require JWT for /api/v1/* (set matching seed on deploy-server):
      CONTROL_API_JWT_SECRET: dev-secret-change-me
    depends_on:
      - deploy-server
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 15s

  nginx:
    build:
      context: .
      target: nginx-with-ui
    image: pirate-test-nginx
    ports:
      - "18080:80"
    depends_on:
      control-api:
        condition: service_healthy

  e2e:
    profiles:
      - e2e
    image: pirate-test-runtime
    pull_policy: never
    command: ["bash", "-lc", "bash /e2e/e2e-docker.sh"]
    volumes:
      - ./scripts/e2e-docker.sh:/e2e/e2e-docker.sh:ro
      - ./tests/fixtures:/fixtures:ro
    environment:
      - nginx_public=http://nginx:80
      - GRPC_ENDPOINT=http://deploy-server:50051
      - CONTROL_API_DIRECT=http://control-api:8080
      - DOCKER_E2E_API_TOKEN=${DOCKER_E2E_API_TOKEN-}
    depends_on:
      nginx:
        condition: service_started
      control-api:
        condition: service_healthy
      deploy-server:
        condition: service_started

volumes:
  deploy-data:
  postgres-data:
