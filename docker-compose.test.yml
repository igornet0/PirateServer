# Full stack for integration / e2e: PostgreSQL, deploy-server, control-api, nginx (static + API proxy).
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   docker compose -f docker-compose.test.yml run --rm e2e
# Or: ./scripts/e2e-docker.sh (wraps the above)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deploy
      POSTGRES_PASSWORD: deploy
      POSTGRES_DB: deploy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy -d deploy"]
      interval: 2s
      timeout: 5s
      retries: 15

  deploy-server:
    build:
      context: .
      target: runtime-base
    image: pirete-test-runtime
    command:
      - deploy-server
      - --root
      - /data
      - --bind
      - "0.0.0.0"
      - -p
      - "50051"
      - --database-url
      - postgresql://deploy:deploy@postgres:5432/deploy
    volumes:
      - deploy-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  control-api:
    image: pirete-test-runtime
    command:
      - control-api
      - --deploy-root
      - /data
      - --bind
      - "0.0.0.0"
      - --listen-port
      - "8080"
      - --grpc-endpoint
      - http://deploy-server:50051
      - --database-url
      - postgresql://deploy:deploy@postgres:5432/deploy
    volumes:
      - deploy-data:/data
    environment:
      CONTROL_API_CORS_ALLOW_ANY: "1"
    depends_on:
      - deploy-server
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 15s

  nginx:
    build:
      context: .
      target: nginx-with-ui
    image: pirete-test-nginx
    ports:
      - "18080:80"
    depends_on:
      control-api:
        condition: service_healthy

  e2e:
    profiles:
      - e2e
    image: pirete-test-runtime
    command: ["bash", "-lc", "bash /e2e/e2e-docker.sh"]
    volumes:
      - ./scripts/e2e-docker.sh:/e2e/e2e-docker.sh:ro
      - ./tests/fixtures:/fixtures:ro
    environment:
      - nginx_public=http://nginx:80
      - GRPC_ENDPOINT=http://deploy-server:50051
      - CONTROL_API_DIRECT=http://control-api:8080
    depends_on:
      nginx:
        condition: service_started
      control-api:
        condition: service_healthy
      deploy-server:
        condition: service_started

volumes:
  deploy-data:
