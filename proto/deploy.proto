syntax = "proto3";

package deploy;

// Artifact-based deployment service (gRPC only).
service DeployService {
  // One-time enrollment: exchange public keys and register this client (requires pairing_code).
  rpc Pair(PairRequest) returns (PairResponse);

  // Client streams tarball chunks; server assembles, verifies, deploys.
  rpc Upload(stream DeployChunk) returns (DeployResponse);

  rpc GetStatus(StatusRequest) returns (StatusResponse);

  rpc Rollback(RollbackRequest) returns (RollbackResponse);
  rpc ValidateDeploy(ValidateDeployRequest) returns (ValidateDeployResponse);

  // Stop app process and remove all deployed data for project (DB rows + files).
  rpc RemoveProject(RemoveProjectRequest) returns (RemoveProjectResponse);

  // Stop managed child without changing the active release (symlink unchanged).
  rpc StopProcess(StopProcessRequest) returns (StatusResponse);

  // Kill and respawn the process for the current `current` release (same version).
  rpc RestartProcess(RestartProcessRequest) returns (StatusResponse);

  // Host resource snapshot (same machine as deploy root); signed like GetStatus.
  rpc GetHostStats(HostStatsRequest) returns (HostStatsResponse);

  // On-demand detail (cpu/memory/disk/network/processes); signed like GetStatus.
  rpc GetHostStatsDetail(HostStatsDetailRequest) returns (HostStatsDetailResponse);

  // OTA: stream a server-stack bundle tarball (e.g. pirate-linux-amd64 from build-linux-bundle.sh).
  rpc UploadServerStack(stream ServerStackChunk) returns (ServerStackResponse);

  // Report installed server-stack version on this host (read from disk; signed like GetStatus).
  rpc GetServerStackInfo(ServerStackInfoRequest) returns (ServerStackInfo);

  // Bidirectional TCP tunnel for outbound HTTP CONNECT / HTTPS (signed like GetStatus; default project).
  rpc ProxyTunnel(stream ProxyClientMsg) returns (stream ProxyServerMsg);

  // Authorized peers + last activity from metadata DB (requires DEPLOY_SQLITE_URL / DATABASE_URL on server).
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // Paginated session / audit log (newest first). Same DB requirement as ListSessions.
  rpc QuerySessionLogs(QuerySessionLogsRequest) returns (QuerySessionLogsResponse);

  // Declare connection role (proxy vs resource compute); signed like GetStatus.
  rpc UpdateConnectionProfile(UpdateConnectionProfileRequest) returns (UpdateConnectionProfileResponse);

  // Client-reported CPU/RAM/GPU/storage snapshot for RESOURCE connections; signed like GetStatus.
  rpc ReportResourceUsage(ReportResourceUsageRequest) returns (ReportResourceUsageResponse);

  // Client streams payload bytes; server measures upload throughput and returns a download blob (signed like GetStatus).
  rpc ConnectionProbe(stream ConnectionProbeChunk) returns (ConnectionProbeResult);

  // Managed proxy session (limits, stats); signed like GetStatus. Optional for legacy ProxyTunnel without token.
  rpc CreateConnection(CreateConnectionRequest) returns (CreateConnectionResponse);
  rpc CloseConnection(CloseConnectionRequest) returns (CloseConnectionResponse);
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  rpc UpdateSettings(UpdateProxySettingsRequest) returns (UpdateProxySettingsResponse);

  // Client-reported monitor list for dashboard display-stream UI (signed like GetStatus).
  rpc ReportDisplayTopology(ReportDisplayTopologyRequest) returns (ReportDisplayTopologyResponse);
}

message PairRequest {
  // Ed25519 public key (32 bytes), standard Base64 URL-safe no padding.
  string client_public_key_b64 = 1;
  int64 timestamp_ms = 2;
  // Random nonce (unique per request); ASCII, max 128 chars.
  string nonce = 3;
  // Must match server's pairing.code from install output (until rotated).
  string pairing_code = 4;
  // Signature over canonical v1|PAIR|... message (see docs), Base64 standard.
  string client_signature_b64 = 5;
}

message PairResponse {
  string server_public_key_b64 = 1;
  string server_signature_b64 = 2;
  string status = 3;
}

message DeployChunk {
  bytes data = 1;
  string version = 2;
  bool is_last = 3;
  // SHA-256 of the full artifact (hex, lowercase). Required when is_last = true.
  string sha256_hex = 4;
  // Logical project id; empty means `default` (legacy single-root layout under --root).
  string project_id = 5;
  // Optional: full `pirate.toml` body (UTF-8). Sent on the last chunk only; server applies after unpack.
  string manifest_toml = 6;
  // Artifact kind: "tar_gz" (default) or reserved for future image transport.
  string artifact_kind = 7;
}

message DeployResponse {
  string status = 1;
  string deployed_version = 2;
}

message StatusRequest {
  // Empty or omitted means `default`.
  string project_id = 1;
}

message StatusResponse {
  // Active app release (symlink `current` → `releases/<ver>`), or when none yet: `stack@…`
  // from server install metadata (`server-stack-version` or `binary-<deploy-server semver>`).
  string current_version = 1;
  // running | stopped | error
  string state = 2;
  // Install bundle for authenticated gRPC (empty when deploy-server runs with auth disabled).
  string client_connect_token = 3;
  string client_connect_url = 4;
  string client_connect_pairing = 5;
  // `[project].version` from `pirate.toml` in the active release (empty if missing).
  string project_version = 6;
  // HTTP base for control-api REST (`/api/v1/...`). Prefer public / nginx URL when set (DEPLOY_CONTROL_API_PUBLIC_URL).
  string control_api_http_url = 7;
  // Direct control-api bind (e.g. `http://host:8080`) when it differs from the public URL (DEPLOY_CONTROL_API_DIRECT_URL or derived from gRPC host).
  string control_api_http_url_direct = 8;
}

message RollbackRequest {
  string version = 1;
  string project_id = 2;
}

message RollbackResponse {
  string status = 1;
  string active_version = 2;
}

message ValidateDeployRequest {
  string project_id = 1;
  string manifest_toml = 2;
}

message ValidateDeployResponse {
  bool allow = 1;
  repeated string blockers = 2;
  repeated string warnings = 3;
}

message RemoveProjectRequest {
  string project_id = 1;
}

message RemoveProjectResponse {
  string status = 1;
  string project_id = 2;
  string removed_root = 3;
  uint64 removed_db_rows = 4;
}

message StopProcessRequest {
  string project_id = 1;
}

message RestartProcessRequest {
  string project_id = 1;
}

// OTA apply hint for pirate-apply-stack-bundle.sh (only honored on the last chunk when set).
enum StackApplyMode {
  STACK_APPLY_MODE_UNSPECIFIED = 0;
  // No transition: only refresh binaries / optional static copy (legacy behavior).
  STACK_APPLY_MODE_NONE = 1;
  // Host had no dashboard JWT; incoming bundle includes UI — merge env, JWT, optional nginx.
  STACK_APPLY_MODE_ENABLE_UI = 2;
  // Host had dashboard; incoming bundle has no UI — strip UI static, JWT, reconfigure nginx.
  STACK_APPLY_MODE_DISABLE_UI = 3;
}

message StackApplyOptions {
  StackApplyMode mode = 1;
  // ENABLE_UI: domain (empty = IP-only in install terms).
  string domain = 2;
  string ui_admin_username = 3;
  string ui_admin_password = 4;
  bool install_nginx = 5;
  bool deploy_allow_server_stack_update = 6;
  bool control_api_host_stats_series = 7;
  bool control_api_host_stats_stream = 8;
  // DISABLE_UI: if true, keep nginx with API-only site; if false, disable pirate nginx site.
  bool nginx_keep_api_proxy = 9;
}

message ServerStackChunk {
  bytes data = 1;
  string version = 2;
  bool is_last = 3;
  // SHA-256 of the full artifact (hex, lowercase). Required when is_last = true.
  string sha256_hex = 4;
  // Only on the last chunk: must match signing metadata x-deploy-stack-apply-sha256 when present.
  StackApplyOptions apply_options = 5;
}

message ServerStackResponse {
  string status = 1;
  string applied_version = 2;
  optional string deploy_server_pkg_version = 3;
  optional string control_api_pkg_version = 4;
}

message ServerStackInfoRequest {
}

// --- Outbound proxy tunnel (paired clients only) ---

// Wire protocol inside gRPC ProxyTunnel `data` frames (Pirate client ↔ deploy-server only).
enum ProxyWireMode {
  PROXY_WIRE_MODE_RAW_TCP_RELAY = 0;
  PROXY_WIRE_MODE_VLESS = 1;
  PROXY_WIRE_MODE_TROJAN = 2;
  PROXY_WIRE_MODE_VMESS = 3;
  PROXY_WIRE_MODE_SHADOWSOCKS = 4;
  PROXY_WIRE_MODE_SOCKS5 = 5;
}

message ProxyOpen {
  string host = 1;
  uint32 port = 2;
  // Opaque token from CreateConnection; empty = legacy mode (no per-session limits on server).
  string session_token = 3;
  // Optional client correlation id for logging / UI.
  string stream_correlation_id = 4;
  // When set to non-RAW, `wire_config_json` carries protocol params; destination is taken from protocol handshake, not from host/port alone.
  optional ProxyWireMode wire_mode = 5;
  optional string wire_config_json = 6;
  // Higher value = higher priority when server limits concurrent tunnels (`DEPLOY_PROXY_MAX_CONCURRENT_TUNNELS`).
  optional int32 tunnel_priority = 7;
  // When true (and server has QUIC data-plane), use QUIC for bytes instead of gRPC frames after OpenResult.
  optional bool prefer_quic_data_plane = 8;
}

// --- Managed proxy sessions (control plane) ---

message ProxyAccessWindow {
  // 1 = Monday .. 7 = Sunday (ISO weekday).
  repeated uint32 days = 1;
  string start = 2;
  string end = 3;
}

message ProxyAccessSchedule {
  string timezone = 1;
  repeated ProxyAccessWindow windows = 2;
}

message ProxyConnectionPolicy {
  optional uint64 max_session_duration_sec = 1;
  optional uint64 traffic_total_bytes = 2;
  optional uint64 traffic_bytes_in_limit = 3;
  optional uint64 traffic_bytes_out_limit = 4;
  optional ProxyAccessSchedule access_schedule = 5;
  // Idle gap (seconds) after which active time stops accruing until next bytes.
  optional uint32 active_idle_timeout_sec = 6;
  // When true, session expiry is effectively unbounded (stored as far-future timestamp server-side).
  optional bool never_expires = 7;
  // When true, max_session_duration_sec is enforced against cumulative active_ms (idle-aware), not wall-clock since first_open_at.
  optional bool limit_duration_by_active_time = 8;
  // Max concurrent tunnels/devices per session (gRPC + optional ingress); 0 = use server default from env.
  optional uint32 max_concurrent_devices_per_session = 9;
}

message CreateConnectionRequest {
  string project_id = 1;
  string board_label = 2;
  ProxyConnectionPolicy policy = 3;
  // If set, the session token is bound to this client public key (share with recipient).
  optional string recipient_client_pubkey_b64 = 4;
  // Same values as ProxyWireMode (1=VLESS, 2=TROJAN, 3=VMESS). Omitted = not stored.
  optional int32 wire_mode = 5;
  // JSON per wire-protocol WireParams (uuid / password / flow).
  optional string wire_config_json = 6;
  // --- Full ingress (public listeners; sing-box metadata), separate from gRPC wire_mode ---
  // 0 = none; 1=VLESS 2=VMess 3=Trojan 4=Shadowsocks 5=SOCKS 6=Hysteria2
  optional int32 ingress_protocol = 7;
  optional uint32 ingress_listen_port = 8;
  optional uint32 ingress_listen_udp_port = 9;
  optional string ingress_config_json = 10;
  optional string ingress_tls_json = 11;
  optional uint32 ingress_template_version = 12;
}

message CreateConnectionResponse {
  string session_id = 1;
  string session_token = 2;
  int64 expires_at_unix_ms = 3;
  string status = 4;
  // Opaque token for public subscription URL (Xray JSON); shown once.
  optional string subscription_token = 5;
  // Full subscription URL when server knows public base (control-api).
  optional string subscription_url = 6;
}

message CloseConnectionRequest {
  string project_id = 1;
  string session_id = 2;
}

message CloseConnectionResponse {
  string status = 1;
}

message GetStatsRequest {
  string project_id = 1;
  // Empty: summary for authenticated pubkey (all sessions aggregate or server-defined).
  string session_id = 2;
}

message GetStatsResponse {
  string session_id = 1;
  uint64 bytes_in = 2;
  uint64 bytes_out = 3;
  uint64 active_ms = 4;
  int64 last_activity_unix_ms = 5;
  bool revoked = 6;
  int64 created_at_unix_ms = 7;
  int64 expires_at_unix_ms = 8;
}

message UpdateProxySettingsRequest {
  string project_id = 1;
  string session_id = 2;
  ProxyConnectionPolicy policy = 3;
  optional int32 wire_mode = 4;
  optional string wire_config_json = 5;
  optional int32 ingress_protocol = 6;
  optional uint32 ingress_listen_port = 7;
  optional uint32 ingress_listen_udp_port = 8;
  optional string ingress_config_json = 9;
  optional string ingress_tls_json = 10;
  optional uint32 ingress_template_version = 11;
}

message UpdateProxySettingsResponse {
  string status = 1;
  int64 expires_at_unix_ms = 2;
}

message ProxyClientMsg {
  oneof body {
    ProxyOpen open = 1;
    bytes data = 2;
    // Client finished sending (shutdown write); server still may send data.
    bool fin = 3;
  }
}

message ProxyOpenResult {
  bool ok = 1;
  string error = 2;
  // When true, proxied bytes use QUIC data-plane (UDP) instead of gRPC frames after this message.
  bool quic_data_plane = 3;
  // Hostname or IP for QUIC; empty means client should use gRPC endpoint host.
  string quic_host = 4;
  // UDP port for QUIC listener on the server (0 = client default, e.g. 7844).
  uint32 quic_port = 5;
  // Opaque short-lived ticket bound to this tunnel; required for first QUIC stream auth.
  bytes data_plane_ticket = 6;
}

message ProxyServerMsg {
  oneof body {
    ProxyOpenResult open_result = 1;
    bytes data = 2;
    // Upstream closed or error reading socket.
    bool eof = 3;
    string error = 4;
  }
}

message ServerStackInfo {
  // Version label from last successful stack apply (same as upload version string).
  string bundle_version = 1;
  // Optional JSON manifest from bundle (build-linux-bundle.sh); empty if missing.
  optional string manifest_json = 2;
  // deploy-server binary Cargo version (always available); useful when manifest files are absent.
  optional string deploy_server_binary_version = 3;
  // True when /etc/pirate-deploy.env has CONTROL_API_JWT_SECRET and UI admin vars (dashboard auth).
  bool host_dashboard_enabled = 4;
  // True when /etc/nginx/sites-enabled/pirate exists; unset means unknown (could not stat).
  optional bool host_nginx_pirate_site = 5;
  // Snapshot from /var/lib/pirate/host-gui-install.json at install time (Linux bundle); unset if missing.
  optional bool host_gui_detected_at_install = 6;
  // Raw JSON from host-gui-install.json (gui_detected, reasons, display_stream_consent, ts_unix, …).
  optional string host_gui_install_json = 7;
}

// --- Host stats (control-plane parity with GET /api/v1/host-stats) ---

message HostStatsRequest {
  // Empty means `default`.
  string project_id = 1;
}

message HostMountStatsProto {
  string path = 1;
  uint64 total_bytes = 2;
  uint64 free_bytes = 3;
}

message HostNetInterfaceProto {
  string name = 1;
  double rx_bytes_per_s = 2;
  double tx_bytes_per_s = 3;
  uint64 rx_errors = 4;
  uint64 tx_errors = 5;
}

message HostLogLineProto {
  int64 ts_ms = 1;
  string level = 2;
  string message = 3;
}

message HostStatsResponse {
  uint64 disk_free_bytes = 1;
  uint64 disk_total_bytes = 2;
  string disk_mount_path = 3;
  uint64 memory_used_bytes = 4;
  uint64 memory_total_bytes = 5;
  float cpu_usage_percent = 6;
  double load_average_1m = 7;
  double load_average_5m = 8;
  double load_average_15m = 9;
  optional float temperature_current_celsius = 10;
  optional float temperature_avg_celsius = 11;
  uint64 process_count = 12;
  repeated HostMountStatsProto disk_mounts = 13;
  repeated HostNetInterfaceProto network_interfaces = 14;
  repeated HostLogLineProto log_tail = 15;
}

message HostStatsDetailRequest {
  string project_id = 1;
  HostStatsDetailKind kind = 2;
  // For cpu, memory, disk (clamped 5–100 server-side).
  uint32 top = 3;
  // For processes search.
  string q = 4;
  // For processes list (clamped 10–2000 server-side).
  uint32 limit = 5;
}

enum HostStatsDetailKind {
  HOST_STATS_DETAIL_KIND_UNSPECIFIED = 0;
  HOST_STATS_DETAIL_CPU = 1;
  HOST_STATS_DETAIL_MEMORY = 2;
  HOST_STATS_DETAIL_DISK = 3;
  HOST_STATS_DETAIL_NETWORK = 4;
  HOST_STATS_DETAIL_PROCESSES = 5;
}

message LoadAvgProto {
  double m1 = 1;
  double m5 = 2;
  double m15 = 3;
}

message CpuTimesProto {
  uint64 user_ms = 1;
  uint64 system_ms = 2;
  uint64 idle_ms = 3;
}

message ProcessCpuProto {
  uint32 pid = 1;
  string name = 2;
  float cpu_percent = 3;
}

message SeriesHintProto {
  repeated string available_ranges = 1;
}

message CpuDetailProto {
  int64 ts_ms = 1;
  LoadAvgProto loadavg = 2;
  CpuTimesProto times = 3;
  repeated ProcessCpuProto top_processes = 4;
  SeriesHintProto series_hint = 5;
}

message MemoryOverviewProto {
  uint64 total_bytes = 1;
  uint64 used_bytes = 2;
  uint64 available_bytes = 3;
  optional uint64 cached_bytes = 4;
  optional uint64 buffers_bytes = 5;
  uint64 swap_total_bytes = 6;
  uint64 swap_used_bytes = 7;
}

message ProcessMemProto {
  uint32 pid = 1;
  string name = 2;
  uint64 memory_bytes = 3;
}

message MemoryDetailProto {
  int64 ts_ms = 1;
  MemoryOverviewProto memory = 2;
  repeated ProcessMemProto top_processes = 3;
}

message DiskIoSummaryProto {
  string note = 1;
}

message ProcessDiskProto {
  uint32 pid = 1;
  string name = 2;
  uint64 read_bytes = 3;
  uint64 write_bytes = 4;
}

message DiskDetailProto {
  int64 ts_ms = 1;
  repeated HostMountStatsProto mounts = 2;
  DiskIoSummaryProto io = 3;
  repeated ProcessDiskProto top_processes = 4;
}

message NetworkDetailProto {
  int64 ts_ms = 1;
  repeated HostNetInterfaceProto interfaces = 2;
  string connections_note = 3;
}

message ProcessRowProto {
  uint32 pid = 1;
  string name = 2;
  float cpu_percent = 3;
  uint64 memory_bytes = 4;
}

message ProcessesDetailProto {
  int64 ts_ms = 1;
  repeated ProcessRowProto processes = 2;
  uint64 total = 3;
}

message HostStatsDetailResponse {
  oneof detail {
    CpuDetailProto cpu = 1;
    MemoryDetailProto memory = 2;
    DiskDetailProto disk = 3;
    NetworkDetailProto network = 4;
    ProcessesDetailProto processes = 5;
  }
}

// --- Client session audit (metadata DB) ---

// How this enrolled client intends to use the connection (operator-set after pair).
enum ConnectionKind {
  CONNECTION_KIND_UNSPECIFIED = 0;
  CONNECTION_KIND_PROXY = 1;
  CONNECTION_KIND_RESOURCE = 2;
}

message ListSessionsRequest {
  // For signing parity with other RPCs; empty means `default`.
  string project_id = 1;
}

message DisplayTopologyDisplay {
  uint32 index = 1;
  string label = 2;
  uint32 width = 3;
  uint32 height = 4;
}

message SessionPeerRow {
  string client_public_key_b64 = 1;
  int64 last_seen_ms = 2;
  string last_peer_ip = 3;
  string last_grpc_method = 4;
  ConnectionKind connection_kind = 5;
  // Client-reported load (RESOURCE); unset when never reported or not applicable.
  optional double last_cpu_percent = 6;
  optional double last_ram_percent = 7;
  optional double last_gpu_percent = 8;
  // Milliseconds since Unix epoch; 0 if never reported.
  int64 resource_reported_at_ms = 9;
  optional uint64 ram_used_bytes = 10;
  optional uint64 storage_used_bytes = 11;
  // Cumulative ProxyTunnel bytes attributed to this peer (sum of hourly buckets).
  uint64 proxy_bytes_in_total = 12;
  uint64 proxy_bytes_out_total = 13;
  repeated DisplayTopologyDisplay display_topology = 14;
  optional bool display_stream_capable = 15;
}

message ReportDisplayTopologyRequest {
  string project_id = 1;
  repeated DisplayTopologyDisplay displays = 2;
  bool stream_capable = 3;
}

message ReportDisplayTopologyResponse {
  string status = 1;
}

message ListSessionsResponse {
  repeated SessionPeerRow peers = 1;
}

message UpdateConnectionProfileRequest {
  string project_id = 1;
  ConnectionKind connection_kind = 2;
  string agent_version = 3;
}

message UpdateConnectionProfileResponse {
  string status = 1;
}

message ReportResourceUsageRequest {
  string project_id = 1;
  optional double cpu_percent = 2;
  optional double ram_percent = 3;
  optional double gpu_percent = 4;
  optional uint64 ram_used_bytes = 5;
  optional uint64 storage_used_bytes = 6;
}

message ReportResourceUsageResponse {
  string status = 1;
}

// First chunk should set project_id (empty = default) and optional download_request_bytes; all chunks contribute to upload measurement.
message ConnectionProbeChunk {
  string project_id = 1;
  uint32 download_request_bytes = 2;
  bytes data = 3;
}

message ConnectionProbeResult {
  uint64 upload_bytes = 1;
  int64 upload_duration_ms = 2;
  bytes download_payload = 3;
}

message QuerySessionLogsRequest {
  string project_id = 1;
  // Server clamps to max 500.
  int32 limit = 2;
  // Next page: pass smallest `id` from the previous page; 0 = first page (newest).
  int64 before_id = 3;
}

message SessionLogEvent {
  int64 id = 1;
  int64 created_at_ms = 2;
  string kind = 3;
  string client_public_key_b64 = 4;
  string peer_ip = 5;
  string grpc_method = 6;
  string status = 7;
  string detail = 8;
}

message QuerySessionLogsResponse {
  repeated SessionLogEvent events = 1;
  bool has_more = 2;
}
